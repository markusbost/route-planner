version: 2
updates:
  # npm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    target-branch: "main"
    groups:
      vite:
        patterns: ["vite", "@vitejs/*"]
      vitest:
        patterns: ["vitest", "@vitest/*"]
      react:
        patterns: ["react", "react-dom", "@types/react*"]
      eslint:
        patterns: ["eslint*"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    target-branch: "main"
